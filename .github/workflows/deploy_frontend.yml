name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'datos/**'
      - '.github/workflows/deploy_frontend.yml'
  workflow_run:
    workflows: ["ETL Weekly Data Refresh"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Download ETL artifact (workflow_run)
        if: ${{ github.event_name == 'workflow_run' }}
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v2
        with:
          run_id: ${{ github.event.workflow_run.id }}
          name: aggregate-data
          path: etl_artifacts
          if_no_artifact_found: warn

      - name: Download ETL artifact (latest main)
        if: ${{ github.event_name != 'workflow_run' }}
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: ETL Weekly Data Refresh
          branch: main
          name: aggregate-data
          path: etl_artifacts
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: Install dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Resolve remote assets base
        shell: bash
        run: |
          REMOTE_DIR="etl_artifacts/datos/metadata/remote_assets"
          REQUIRED_FILES=(
            "history_index.json"
            "trend_score_history.json"
            "technology_profiles.json"
            "home_highlights.json"
            "github_lenguajes_public.json"
            "github_frameworks_history.json"
            "github_correlacion_history.json"
            "so_volumen_history.json"
            "so_aceptacion_history.json"
            "so_tendencias_history.json"
            "reddit_sentimiento_public.json"
            "reddit_temas_history.json"
            "reddit_interseccion_history.json"
          )

          if [ -d "$REMOTE_DIR" ]; then
            missing=0
            for file in "${REQUIRED_FILES[@]}"; do
              if [ ! -f "$REMOTE_DIR/$file" ]; then
                echo "Missing remote asset: $file"
                missing=1
              fi
            done
            if [ "$missing" -eq 0 ]; then
              echo "REMOTE_ASSETS_BASE_URL=https://sam-24-dev.github.io/Technology-trend-analysis-platform/assets/data/" >> $GITHUB_ENV
              echo "Remote assets complete; enabling REMOTE_ASSETS_BASE_URL."
            else
              echo "REMOTE_ASSETS_BASE_URL=" >> $GITHUB_ENV
              echo "Remote assets incomplete; using local bundled assets."
            fi
          else
            echo "REMOTE_ASSETS_BASE_URL=" >> $GITHUB_ENV
            echo "Remote assets not found; using local bundled assets."
          fi

      - name: Build Flutter Web
        run: |
          cd frontend
          flutter build web --base-href "/Technology-trend-analysis-platform/" --dart-define=USE_HISTORY_BRIDGE_JSON=true --dart-define=REMOTE_ASSETS_BASE_URL=${REMOTE_ASSETS_BASE_URL}

      - name: Inject remote JSON assets
        shell: bash
        run: |
          if [ -d "etl_artifacts/datos/metadata/remote_assets" ]; then
            mkdir -p frontend/build/web/assets/data
            cp -f etl_artifacts/datos/metadata/remote_assets/*.json frontend/build/web/assets/data/ 2>/dev/null || true
            echo "Remote assets injected from ETL artifact."
          else
            echo "No remote assets found in ETL artifact; keeping local stubs."
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/build/web
