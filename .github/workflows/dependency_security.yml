name: Dependency Security Audit

on:
  push:
    branches: [main, feat/backend]
    paths:
      - 'backend/requirements.lock'
      - '.github/workflows/dependency_security.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/requirements.lock'
      - '.github/workflows/dependency_security.yml'
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.lock'

      - name: Install dependencies and audit tool
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.lock
          pip install pip-audit==2.10.1
      - name: Run vulnerability audit
        run: |
          pip-audit -r backend/requirements.lock
