name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect_secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'

      - name: Run detect-secrets
        run: |
          python -m pip install --disable-pip-version-check detect-secrets==1.5.0
          git ls-files -z | grep -zv '^\.secrets\.baseline$' | xargs -0r detect-secrets-hook --baseline .secrets.baseline
