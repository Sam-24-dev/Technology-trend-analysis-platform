name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect_secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'

      - name: Run detect-secrets
        run: |
          pip install detect-secrets==1.5.0
          git ls-files -z | grep -zv '^.secrets.baseline$' | xargs -0 detect-secrets-hook --baseline .secrets.baseline
